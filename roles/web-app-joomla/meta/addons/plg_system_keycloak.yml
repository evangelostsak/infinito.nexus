---
enabled: "{{ lookup('config', 'web-app-joomla', 'services.sso.enabled') | bool }}"
required: false
mechanism: plugin
source: built
version: "1.0.0"
bridges:
  - sso
config:
  issuer_url: "{{ OIDC.CLIENT.ISSUER_URL }}"
  client_id: "{{ OIDC.CLIENT.ID }}"
  client_secret: "{{ OIDC.CLIENT.SECRET }}"
  redirect_uri: "{{ lookup('tls', 'web-app-joomla', 'url.base') }}/index.php?option=keycloak&task=callback"
  end_session_url: "{{ OIDC.CLIENT.LOGOUT_URL }}"
  fallback_enabled: "{{ lookup('config', 'web-app-joomla', 'services.sso.oidc.fallback_enabled') | string | lower }}"
  group_admin: "/{{ lookup('rbac_group_path', application_id='web-app-joomla', role='administrator') }}"
  group_editor: "/{{ lookup('rbac_group_path', application_id='web-app-joomla', role='editor') }}"
  group_user: "/roles/web-app-joomla"
