---
- name: "compose-flavor: list MDAD systemd units to tear down"
  ansible.builtin.shell:
    cmd: |
      systemctl list-unit-files --no-legend --no-pager 'matrix-*.service' 'matrix-*.timer' 2>/dev/null \
        | awk '{print $1}' \
        | grep -vE '^matrix-(homeserver|server|services)\.target$' \
        || true
  register: _matrix_mdad_units
  changed_when: false

- name: "compose-flavor: stop + disable MDAD systemd units"
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ _matrix_mdad_units.stdout_lines | default([]) }}"
  failed_when: false

- name: "compose-flavor: remove MDAD systemd unit files"
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}"
    state: absent
  loop: "{{ _matrix_mdad_units.stdout_lines | default([]) }}"

- name: "compose-flavor: reload systemd if MDAD units were removed"
  ansible.builtin.systemd:
    daemon_reload: true
  when: _matrix_mdad_units.stdout_lines | default([]) | length > 0

- name: "compose-flavor: force-remove leftover MDAD docker containers"
  ansible.builtin.shell:
    cmd: |
      container ps -a --filter 'name=^/matrix-' --format '{{ '{{' }}.Names{{ '}}' }}' \
        | xargs -r -n1 container rm -f
  register: _matrix_mdad_containers_removed
  changed_when: _matrix_mdad_containers_removed.stdout | length > 0
